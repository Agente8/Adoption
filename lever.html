<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vista de palanca</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(12, 24, 42, 0.82);
        --text: #e8f3ff;
        --muted: #9ab2d1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(185,130,255,.14), transparent 28%),
          linear-gradient(135deg, #07111f, #0a1627 55%, #071423);
        min-height: 100vh;
      }
      .page { max-width: 1180px; margin: 0 auto; padding: 32px; }
      .hero, .step {
        background: var(--panel);
        border: 1px solid rgba(149, 206, 255, 0.14);
        border-radius: 28px;
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      }
      .hero { padding: 32px; }
      .eyebrow { text-transform: uppercase; letter-spacing: .18em; color: #8fb4db; font-size: .75rem; }
      h1 { margin: 10px 0 8px; font-size: 3rem; }
      p { color: var(--muted); line-height: 1.6; }
      .timeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 28px; }
      .step { padding: 20px; }
      .step strong { display: block; font-size: 1.05rem; margin-bottom: 8px; }
      .meta { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
      .chip { padding: 10px 12px; border-radius: 999px; background: rgba(255,255,255,.04); border: 1px solid rgba(149,206,255,.12); }
      @media (max-width: 900px) { .timeline { grid-template-columns: 1fr; } h1 { font-size: 2.2rem; } }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="eyebrow">Vista dedicada</div>
        <h1 id="title">Palanca P1</h1>
        <p id="summary"></p>
        <div class="meta">
          <div class="chip">Nueva ventana</div>
          <div class="chip">Lectura completa de palanca</div>
          <div class="chip" id="chip"></div>
        </div>
      </section>
      <section class="timeline" id="timeline"></section>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const lever = params.get('lever') || 'P1';
      const num = Number(lever.replace('P', '')) || 1;
      const texts = {
        1: 'P1 introduce la lógica del sistema y se adapta a cada etapa como estructura de arranque.',
        2: 'P2 organiza foco y claridad a través del proceso completo.',
        3: 'P3 conecta etapas y ayuda a comparar transiciones y continuidades.',
        4: 'P4 impulsa activación, síntesis y consolidación progresiva.',
        5: 'P5 acompaña la madurez del recorrido y su lectura final.'
      };
      document.getElementById('title').textContent = `Palanca ${lever}`;
      document.getElementById('summary').textContent = texts[num];
      document.getElementById('chip').textContent = `${lever} de 5`;
      const timeline = document.getElementById('timeline');
      for (let e = 1; e <= 5; e++) {
        const step = document.createElement('article');
        step.className = 'step';
        step.innerHTML = `<strong>${lever} en E${e}</strong><p>Esta tarjeta muestra cómo ${lever} cambia al atravesar E${e}. Aquí luego irá la definición real de la palanca dentro de la etapa.</p>`;
        timeline.appendChild(step);
      }
    </script>
  </body>
</html>
