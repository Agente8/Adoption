<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vista de palanca · Adopción del Mindset IA</title>
    <style>
      :root { --bg: #07111f; --panel: rgba(12,24,42,.82); --text: #e8f3ff; --muted: #9ab2d1; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: Inter, system-ui, sans-serif; color: var(--text);
        background: radial-gradient(circle at top right, rgba(185,130,255,.14), transparent 28%), linear-gradient(135deg, #07111f, #0a1627 55%, #071423);
        min-height: 100vh;
      }
      .page { max-width: 1180px; margin: 0 auto; padding: 32px; }
      .topnav, .hero, .step { background: var(--panel); border: 1px solid rgba(149,206,255,.14); border-radius: 28px; backdrop-filter: blur(18px); box-shadow: 0 20px 80px rgba(0,0,0,.35); }
      .topnav { padding: 14px 18px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
      .navlink { color: var(--muted); text-decoration: none; padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(149,206,255,.12); background: rgba(255,255,255,.03); }
      .navlink.active { color: var(--text); background: linear-gradient(135deg, rgba(101,217,255,.15), rgba(185,130,255,.15)); }
      .hero { padding: 32px; }
      .eyebrow { text-transform: uppercase; letter-spacing: .18em; color: #8fb4db; font-size: .75rem; }
      h1 { margin: 10px 0 8px; font-size: 3rem; }
      p { color: var(--muted); line-height: 1.6; }
      .timeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 28px; }
      .step { padding: 20px; }
      .step strong { display: block; font-size: 1.05rem; margin-bottom: 8px; }
      .meta { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
      .chip { padding: 10px 12px; border-radius: 999px; background: rgba(255,255,255,.04); border: 1px solid rgba(149,206,255,.12); }
      @media (max-width: 900px) { .timeline { grid-template-columns: 1fr; } h1 { font-size: 2.2rem; } }
    </style>
  </head>
  <body>
    <div class="page">
      <nav class="topnav">
        <a class="navlink" href="index.html">Mapa</a>
        <a class="navlink" id="stageLink" href="stage.html?stage=1">Etapas</a>
        <a class="navlink active" id="selfLink" href="lever.html?lever=1">Palancas</a>
        <a class="navlink" href="help.html">Ayuda</a>
      </nav>
      <section class="hero">
        <div class="eyebrow">Adopción del Mindset IA</div>
        <h1 id="title">Comunicación</h1>
        <p id="summary"></p>
        <div class="meta">
          <div class="chip">Misma ventana</div>
          <div class="chip">Lectura completa de palanca</div>
          <div class="chip" id="chip"></div>
        </div>
      </section>
      <section class="timeline" id="timeline"></section>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const leverId = Number(params.get('lever') || '1');
      const levers = ['Comunicación', 'Formación', 'Soporte', 'Gobernanza', 'Incentivos'];
      const stages = ['Alinear', 'Explorar', 'Capacitar', 'Expandir', 'Evolucionar'];
      const lever = levers[leverId - 1] || levers[0];
      const num = leverId;
      const texts = {
        1: 'Comunicación introduce la lógica del sistema y se adapta a cada etapa como estructura de arranque.',
        2: 'Formación organiza foco y claridad a través del proceso completo.',
        3: 'Soporte conecta etapas y ayuda a comparar transiciones y continuidades.',
        4: 'Gobernanza impulsa activación, síntesis y consolidación progresiva.',
        5: 'Incentivos acompaña la madurez del recorrido y su lectura final.'
      };
      document.getElementById('title').textContent = lever;
      document.getElementById('summary').textContent = texts[num];
      document.getElementById('chip').textContent = `Palanca ${num} de 5`;
      document.getElementById('selfLink').href = `lever.html?lever=${num}`;
      document.getElementById('stageLink').href = `stage.html?stage=${num}`;
      const timeline = document.getElementById('timeline');
      for (let e = 1; e <= 5; e++) {
        const step = document.createElement('article');
        step.className = 'step';
        step.innerHTML = `<strong>${lever} en ${stages[e - 1]}</strong><p>Esta tarjeta muestra cómo ${lever} cambia al atravesar ${stages[e - 1]}. Aquí luego irá la definición real de la palanca dentro de la etapa.</p>`;
        timeline.appendChild(step);
      }
    </script>
  </body>
</html>
